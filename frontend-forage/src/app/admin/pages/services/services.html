<h2>Gestion des services</h2>

<!-- Création -->
<div class="card p-3 mb-4">
  <div class="position-relative">
    <input
      class="form-control mb-1"
      placeholder="Titre"
      [(ngModel)]="newService.titre"
      (input)="onTitreInput()"
      (blur)="hideLater()"
      autocomplete="off"
    />

    @if (showSuggestions && filteredTitles.length > 0) {
      <ul class="list-group position-absolute w-100 z-3">
        @for (t of filteredTitles; track $index) {
          <li class="list-group-item list-group-item-action" (mousedown)="pickTitle(t)">
            {{ t }}
          </li>
        }
      </ul>
    }
  </div>

  <textarea
    class="form-control mb-2"
    placeholder="Description"
    [(ngModel)]="newService.description"
  ></textarea>

  <input type="file" class="form-control mb-2" accept="image/*" (change)="onFileSelected($event)" />
  @if (previewUrl) {
    <img [src]="previewUrl" class="rounded mb-2" style="max-width: 220px; height: auto" />
  }

  <button class="btn btn-success" (click)="create()">Ajouter</button>
</div>

<!-- Liste -->
<table class="table table-dark table-striped">
  <thead>
    <tr>
      <th>Titre</th>
      <th>Description</th>
      <th>Actif</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody>
    @for (s of services; track s.id) {
      <tr>
        <td>{{ s.titre }}</td>
        <td class="text-truncate" style="max-width: 520px">
          {{ s.description }}
        </td>
        <td>
          <input type="checkbox" [checked]="!!s.is_active" (change)="toggle(s)" />
        </td>
        <td>
          <button class="btn btn-sm btn-danger" (click)="remove(s.id)">Supprimer</button>
        </td>
      </tr>
    }
  </tbody>
</table>
