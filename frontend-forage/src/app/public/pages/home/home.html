<div class="animated-background" (mousemove)="onMouseMove($event)">
  <div
    class="mouse-circle"
    [ngStyle]="{
      left: circleX + 'px',
      top: circleY + 'px',
      opacity: circleVisible ? 1 : 0
    }"
  ></div>
</div>

<section id="equipes">

</section>

</section>
