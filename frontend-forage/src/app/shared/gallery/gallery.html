<div class="gallery-overlay" (click)="closeGallery()">
  <div class="gallery-content" (click)="$event.stopPropagation()">
    <button class="nav prev" (click)="prev()">❮</button>
    <button class="nav next" (click)="next()">❯</button>

    <div class="gallery-img">
      <img [src]="photos[index].image" alt="">
    </div>

    <button class="close-btn" (click)="closeGallery()">×</button>

    <div class="caption">{{ photos[index].legenda }}</div>
  </div>
</div>
